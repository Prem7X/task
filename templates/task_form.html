{% extends 'base.html' %}
{% block title %}{{ 'Edit Task' if task else 'New Task' }}{% endblock %}
{% block page_title %}{{ 'Edit Task' if task else 'New Task' }}{% endblock %}

{% block content %}
<div class="form-wrap">
  <form method="post" class="form-card">
    <div class="form-group">
      <label class="label">Title <span class="required">*</span></label>
      <input type="text" name="title" class="input"
             value="{{ task.title if task else '' }}"
             placeholder="What needs to be done?" required autofocus>
    </div>

    <div class="form-group">
      <label class="label">Description</label>
      <textarea name="description" class="input textarea" rows="4"
                placeholder="Add more details…">{{ task.description if task else '' }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="label">Priority</label>
        <select name="priority" class="input">
          <option value="low"    {% if task and task.priority=='low'    %}selected{% endif %}>🟢 Low</option>
          <option value="medium" {% if not task or task.priority=='medium' %}selected{% endif %}>🟡 Medium</option>
          <option value="high"   {% if task and task.priority=='high'   %}selected{% endif %}>🔴 High</option>
        </select>
      </div>
      <div class="form-group">
        <label class="label">Status</label>
        <select name="status" class="input">
          <option value="pending"     {% if not task or task.status=='pending'     %}selected{% endif %}>Pending</option>
          <option value="in_progress" {% if task and task.status=='in_progress' %}selected{% endif %}>In Progress</option>
          <option value="done"        {% if task and task.status=='done'        %}selected{% endif %}>Done</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="label">Category</label>
        <select name="category_id" class="input">
          <option value="">— None —</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}"
            {% if task and task.category_id == cat.id %}selected{% endif %}>
            {{ cat.name }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="label">Due Date</label>
        <input type="date" name="due_date" class="input"
               value="{{ task.due_date.strftime('%Y-%m-%d') if task and task.due_date else '' }}">
      </div>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('tasks') }}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary">
        {{ 'Save Changes' if task else 'Create Task' }}
      </button>
    </div>
  </form>
</div>
{% endblock %}
